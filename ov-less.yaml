    watch:
        - "T"
        - "ctrl+alt+w"
    watch_interval:
        - "ctrl+w"
    width_left:
        - "alt+left"
    width_right:
        - "alt+right"
    word_wrap_mode:
        - "alt+w"
    wrap_mode:
        - "w"
        - "W"
    write_exit:
        - "Q"
    write_original:
        - "alt+shift+F8"


# View mode specific settings
# The "General" setting can be overridden in view mode.
Mode:
  markdown:
    SectionDelimiter: "^#"
    Wrap: "word"
    Style:
      SectionLine:
        Background: "blue"
  psql:
    Header: 2
    AlternateRows: true
    ColumnMode: true
    LineNumMode: false
    Wrap: "character"
    ColumnDelimiter: "|"
  mysql:
    Header: 3
    AlternateRows: true
    ColumnMode: true
    LineNumMode: false
    Wrap: "character"
    ColumnDelimiter: "|"
  ps:
    Header: 1
    ColumnMode: true
    ColumnRainbow: true
    ColumnWidth: true
    Wrap: "none"
